<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fff7df">
<title>レモンの木 投稿づくり</title>
<style>
:root{--cream:#fffaf1;--yellow:#f6d96b;--yellow2:#fff2b7;--green:#718b69;--green2:#edf4e9;--brown:#604e43;--line:#eadfce;--danger:#d95d57;--white:#fff;--muted:#aaa39d;--shadow:0 10px 28px rgba(96,78,67,.11)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:radial-gradient(circle at 0 0,rgba(246,217,107,.25),transparent 35%),linear-gradient(#fffdf9,#fff7e9);color:var(--brown);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;min-height:100vh}.app{width:min(100%,760px);margin:auto;padding:14px 13px 42px}.hero{background:linear-gradient(135deg,#fff9d9,#ffe99d);border:1px solid rgba(170,140,60,.18);border-radius:25px;padding:19px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;font-weight:800;color:#597151;letter-spacing:.08em}h1{font-size:25px;margin:5px 0 7px}.hero p{font-size:14px;line-height:1.65;margin:0;max-width:95%}.card{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:21px;padding:17px;margin-top:13px;box-shadow:0 7px 20px rgba(96,78,67,.07)}.card-title{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:850;margin-bottom:13px}.step{display:grid;place-items:center;width:27px;height:27px;border-radius:50%;background:var(--yellow);font-size:13px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:520px){.grid{grid-template-columns:1fr}}label.small{display:block;font-size:12px;font-weight:750;color:#7d6d62;margin:0 0 6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:#fffefb;color:var(--brown);padding:12px;font:inherit;outline:none}input:focus,select:focus,textarea:focus{border-color:#d8bd62;box-shadow:0 0 0 3px rgba(246,217,107,.22)}.menu-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px;margin-bottom:8px}.menu-label{font-size:13px;font-weight:900;color:#587052}.mini-btn{border:0;background:var(--green2);color:#4f6b49;border-radius:10px;padding:7px 9px;font-weight:800;font-size:12px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip input{display:none}.chip span{display:inline-flex;align-items:center;padding:9px 12px;border-radius:999px;border:1px solid var(--line);background:#fffdf8;font-size:13px;font-weight:750;transition:.15s}.chip input:checked+span{background:var(--yellow2);border-color:#dec35f;transform:translateY(-1px)}.empty{font-size:12px;color:#9b8c82;padding:6px 0}.reserve-box{display:grid;gap:10px;padding:13px;border:1px dashed #d6c47d;background:#fffdf0;border-radius:15px}.reserve-status{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px}.status-pill{padding:6px 9px;border-radius:999px;background:var(--green2);color:#506c49;font-weight:850;white-space:nowrap}.status-pill.no-slots{background:#fff0ef;color:var(--danger);border:1px solid #efb8b4}.reserve-detail.no-slots{color:var(--danger);font-weight:900}.note{font-size:12px;color:#817166;line-height:1.6;margin:8px 0 0}button{border:0;border-radius:14px;padding:12px 14px;font:inherit;font-weight:850;cursor:pointer}.btn-primary{width:100%;background:linear-gradient(135deg,#f7dc73,#efc94b);color:#554321;box-shadow:0 7px 17px rgba(210,170,40,.2)}.emoji-switch{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.emoji-btn{padding:10px 8px;background:#f5efe6;color:#74645a;border:1px solid var(--line)}.emoji-btn.active{background:var(--yellow2);border-color:#dec35f;color:#554321;box-shadow:0 3px 10px rgba(210,170,40,.12)}.post-blocked{min-height:130px;display:grid;place-items:center;text-align:center;color:var(--danger);font-weight:900;background:#fff5f4;border:1px solid #efb8b4}.actions button:disabled,.btn-primary:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}.btn-secondary{background:#f0f5ed;color:#506c49}.btn-copy{background:var(--green);color:#fff}.btn-x{background:#222;color:#fff}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.preview{white-space:pre-wrap;min-height:220px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;font-size:15px;line-height:1.78}.meta{margin-top:9px;font-size:12px;color:#8e8076;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
/* modal */
.modal{position:fixed;inset:0;background:rgba(66,55,47,.34);display:none;align-items:flex-end;justify-content:center;z-index:50}.modal.open{display:flex}.sheet{width:min(100%,760px);max-height:90vh;overflow:auto;background:#fffaf3;border-radius:24px 24px 0 0;padding:16px 14px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -14px 34px rgba(0,0,0,.14)}.sheet-head{display:flex;justify-content:space-between;align-items:center;gap:10px;position:sticky;top:-16px;background:#fffaf3;padding:13px 0 10px;z-index:3}.sheet h2{font-size:20px;margin:0}.close{width:38px;height:38px;border-radius:50%;padding:0;background:#f0e8dc;color:#66564c}.tabs{display:flex;gap:7px;overflow:auto;padding:2px 0 10px}.tab{white-space:nowrap;background:#f4eee5;color:#74645a;padding:9px 12px}.tab.active{background:var(--yellow2);color:#5a482b}.manage-controls{display:grid;grid-template-columns:1fr auto;align-items:end;gap:9px;margin-bottom:11px}.count{width:82px}.add-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px}.add-btn{background:var(--green);color:#fff}.menu-list{display:grid;gap:8px;overflow:hidden}.swipe-wrap{position:relative;border-radius:14px;overflow:hidden;touch-action:pan-y}.trash{position:absolute;right:0;top:0;bottom:0;width:78px;background:var(--danger);color:#fff;border-radius:0;display:flex;align-items:center;justify-content:center;font-size:21px;z-index:0}.manage-item{position:relative;z-index:1;display:grid;grid-template-columns:34px 1fr 27px;align-items:center;gap:5px;min-height:53px;padding:8px 10px;background:#fff;border:1px solid var(--line);border-radius:14px;transition:transform .18s,opacity .18s,filter .18s;user-select:none}.manage-item.off{background:#eeeae6;color:#aaa39d;filter:grayscale(1);opacity:.72}.drag{font-size:20px;color:#b7aa9f;text-align:center;cursor:grab}.item-name{font-weight:780;font-size:14px}.state-dot{width:11px;height:11px;border-radius:50%;background:#86aa78;justify-self:center}.off .state-dot{background:#bbb4ae}.helper{font-size:12px;line-height:1.55;color:#85756a;background:#fff4d4;border-radius:12px;padding:10px;margin-bottom:10px}.dragging{opacity:.55}.swiped{transform:translateX(-78px)}
</style>
</head>
<body>
<main class="app">
<section class="hero"><div class="eyebrow">和洋喫茶 レモンの木</div><h1>本日のメニュー投稿づくり</h1><p>メニュー、天気、空き状況を選ぶと、投稿文がその場で更新されます。</p></section>
<section class="card"><div class="card-title"><span class="step">1</span>基本情報</div><div class="grid"><div><label class="small">投稿日</label><input type="date" id="postDate"></div><div><label class="small">今日の天気</label><select id="weather"><option value="hot">暑い・晴れ</option><option value="veryhot">猛暑</option><option value="rain">雨</option><option value="cloudy">くもり</option><option value="cool">少し涼しい</option><option value="none">天気文を入れない</option></select></div></div></section>
<section class="card"><div class="card-title"><span class="step">2</span>本日のメニュー</div><div id="menuArea"></div><div class="menu-head"><div class="menu-label">その他・本日限定</div></div><input id="customMenu" type="text" placeholder="例：梅とうぐいす、季節のタルト"><div class="menu-head"><div class="menu-label">数量や売り切れ情報</div></div><input id="limitedInfo" type="text" placeholder="例：ピーチは僅かなご用意です"></section>
<section class="card"><div class="card-title"><span class="step">3</span>Airリザーブの空き状況</div><div class="reserve-box"><div class="reserve-status"><div><strong>取得結果（叩き台）</strong><br><span id="reserveDetail" class="reserve-detail">14:00、15:30に空きあり</span></div><span class="status-pill" id="reserveBadge">後半に空き</span></div><select id="reserveType"><option value="afternoon">本日後半に空きあり</option><option value="morning">本日前半に空きあり</option><option value="wide">比較的ゆったり</option><option value="few">残り僅か</option><option value="full">満席</option><option value="noSlots">予約枠なし（休業日など）</option><option value="none">投稿には入れない</option></select><button class="btn-secondary" id="mockFetch">空き状況を再取得</button></div><p class="note">現在は仮表示です。Airリザーブ公開ページからの実取得はまだ接続していません。</p></section>
<section class="card"><div class="card-title"><span class="step">4</span>投稿文</div><label class="small">絵文字の量</label><div class="emoji-switch" id="emojiSwitch"><button class="emoji-btn active" data-emoji="none">絵文字無し</button><button class="emoji-btn" data-emoji="few">少なめ</button><button class="emoji-btn" data-emoji="many">多め</button></div><button class="btn-primary" id="generate">新たに作成</button><div style="height:12px"></div><div class="preview" id="preview"></div><div class="meta"><span id="charCount">0文字</span><span id="generatedAt"></span></div><div class="actions"><button class="btn-copy" id="copy">文章をコピー</button><button class="btn-x" id="openX">Xを開く</button></div></section>
</main>
<div class="modal" id="modal"><section class="sheet"><div class="sheet-head"><h2>メニュー管理</h2><button class="close" id="closeModal">×</button></div><div class="tabs" id="tabs"></div><div class="helper">メニューをタップすると表示／非表示が切り替わります。長押しして移動すると並べ替え、左へスワイプすると削除ボタンが出ます。</div><div class="manage-controls"><div><label class="small">投稿画面に表示する数</label><input class="count" id="displayCount" type="number" min="1" max="30"></div></div><div class="add-row"><input id="newMenu" type="text" placeholder="新しいメニュー名"><button class="add-btn" id="addMenu">追加</button></div><div class="menu-list" id="menuList"></div></section></div>
<script>
const defaults={
 bread:{label:'パン・軽食',displayCount:6,items:[['サンド各種',1],['小倉トースト',1],['ハムチーズトースト',1]]},
 dessert:{label:'デザート',displayCount:6,items:[['プリンアラモード',1],['ベイクドチーズ',1],['ロールケーキ',1]]},
 ice:{label:'かき氷',displayCount:10,items:[['黒蜜きな粉',1],['ジンジャーココア',1],['クリームソーダ',1],['グリーンラッチー',1],['ピーチカスタード',1],['カフェオレ大福',1],['梅とうぐいす',1]]},
 other:{label:'その他',displayCount:6,items:[]}
};
let store=load();let activeCat='bread';let variant=0;let inputTimer;
function load(){try{const x=JSON.parse(localStorage.getItem('lemonMenuStore'));if(x)return x}catch(e){}return structuredClone(defaults)}
function save(){localStorage.setItem('lemonMenuStore',JSON.stringify(store))}
const $=id=>document.getElementById(id);
$('postDate').value=new Date().toLocaleDateString('sv-SE');
const learnedPatterns={
 openings:['おはようございます。','本日も営業いたします。',''],
 closings:['よろしくお願いいたします。','本日もよろしくお願いいたします。','ご来店お待ちしております。'],
 weather:{hot:['今日も暑くなりそうです。','暑い一日になりそうです。'],veryhot:['厳しい暑さになりそうです。','今日も気温が高くなりそうです。'],rain:['あいにくのお天気ですが、本日も営業いたします。','雨の一日となりそうです。お足元にお気を付けてお越しください。'],cloudy:['少し落ち着いたお天気になりそうです。','曇り空の一日となりそうです。'],cool:['少し過ごしやすい一日になりそうです。','今日は少し涼しく感じられそうです。'],none:['']},
 reserve:{afternoon:['本日後半落ち着いてます。\nご予約受付中です。','本日後半のお時間に空きがございます。\n当日のご予約も受付中です。'],morning:['本日お早い時間ご予約ございません。\nご予約受付中です。','本日前半のお時間に空きがございます。'],wide:['本日のお席とても落ち着いております。\nご予約受付中です。','本日は比較的ゆったりご案内できます。'],few:['お席残り僅かとなっております。','ご予約はお早めがおすすめです。'],full:['本日はご予約で満席となっております。','本日は満席です。キャンセル等で空きが出る場合もございます。'],none:['']}
};
let emojiMode='none';
const emojiSets={none:{weather:'',reserve:'',close:''},few:{weather:'',reserve:'❣️',close:''},many:{weather:'🌞',reserve:'❣️',close:'✨'}};
function pick(arr,offset=0){return arr[(variant+offset)%arr.length]}
function applyEmoji(text,kind){if(!text)return text;const e=emojiSets[emojiMode][kind]||'';if(!e)return text;const lines=text.split('\n');lines[lines.length-1]+=e;return lines.join('\n')}
function renderMenus(){const area=$('menuArea');area.innerHTML='';Object.entries(store).forEach(([key,cat])=>{const active=cat.items.filter(x=>x[1]).slice(0,cat.displayCount);const block=document.createElement('div');block.innerHTML=`<div class="menu-head"><div class="menu-label">${cat.label}</div><button class="mini-btn" data-manage="${key}">管理</button></div><div class="chips" data-chips="${key}"></div>`;const chips=block.querySelector('.chips');if(!active.length)chips.innerHTML='<div class="empty">表示中のメニューはありません</div>';active.forEach(([name])=>{const lab=document.createElement('label');lab.className='chip';lab.innerHTML=`<input type="checkbox" value="${esc(name)}" data-cat="${key}"><span>${esc(name)}</span>`;chips.appendChild(lab)});area.appendChild(block)});area.querySelectorAll('input[type=checkbox]').forEach(e=>e.addEventListener('change',generatePost));area.querySelectorAll('[data-manage]').forEach(b=>b.onclick=()=>openManage(b.dataset.manage))}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function selectedMenus(){const result={};document.querySelectorAll('.chips input:checked').forEach(i=>(result[i.dataset.cat]??=[]).push(i.value));const custom=$('customMenu').value.trim();if(custom)(result.other??=[]).push(...custom.split(/[、,，]/).map(x=>x.trim()).filter(Boolean));return result}
function buildMenuLine(groups){const chunks=[];Object.entries(store).forEach(([key,cat])=>{const list=groups[key]||[];if(!list.length)return;if(key==='ice')chunks.push(`かき氷（${list.join('、')}）`);else chunks.push(list.join('、'))});return chunks.join('、')||'本日のメニューをご用意しております'}
function formatDate(v){const d=new Date(v+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}`}
function updateReserveDisplay(){const type=$('reserveType').value;const badge=$('reserveBadge');const detail=$('reserveDetail');const map={afternoon:['後半に空き','14:00、15:30に空きあり'],morning:['前半に空き','午前中に空きあり'],wide:['空きあり','比較的ゆったりご案内可能'],few:['残り僅か','空き枠は残り僅か'],full:['満席','予約可能な空き枠なし'],noSlots:['予約枠なし','休業日などのため予約枠がありません'],none:['投稿しない','空き状況を投稿文に入れません']};const v=map[type]||map.none;badge.textContent=v[0];detail.textContent=v[1];const noSlots=type==='noSlots';badge.classList.toggle('no-slots',noSlots);detail.classList.toggle('no-slots',noSlots)}
function setBlocked(blocked){$('generate').disabled=blocked;$('copy').disabled=blocked;$('openX').disabled=blocked;$('preview').classList.toggle('post-blocked',blocked)}
function generatePost(){updateReserveDisplay();const reserveType=$('reserveType').value;if(reserveType==='noSlots'){setBlocked(true);$('preview').textContent='本日は予約枠がないため、投稿対象外です。';$('charCount').textContent='0文字';$('generatedAt').textContent='更新 '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});return}setBlocked(false);const date=formatDate($('postDate').value);const menu=buildMenuLine(selectedMenus());const opening=pick(learnedPatterns.openings,1);const weather=applyEmoji(pick(learnedPatterns.weather[$('weather').value]),'weather');const reserve=reserveType==='none'?'':applyEmoji(pick(learnedPatterns.reserve[reserveType]),'reserve');const limited=$('limitedInfo').value.trim();const closing=applyEmoji(pick(learnedPatterns.closings,2),'close');const p=[date];if(opening)p.push('',opening);p.push('',menu);if(weather)p.push('',weather);if(reserve)p.push('',reserve);if(limited)p.push('',limited);p.push('','最新状況は予約ページよりご確認ください。',closing);const text=p.join('\n');$('preview').textContent=text;$('charCount').textContent=text.length+'文字';$('generatedAt').textContent='更新 '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}
function realtime(){clearTimeout(inputTimer);inputTimer=setTimeout(generatePost,220)}
function openManage(key){activeCat=key;$('modal').classList.add('open');renderManager()}
function renderManager(){const tabs=$('tabs');tabs.innerHTML='';Object.entries(store).forEach(([key,cat])=>{const b=document.createElement('button');b.className='tab'+(key===activeCat?' active':'');b.textContent=cat.label;b.onclick=()=>{activeCat=key;renderManager()};tabs.appendChild(b)});$('displayCount').value=store[activeCat].displayCount;renderList()}
function renderList(){const list=$('menuList');list.innerHTML='';store[activeCat].items.forEach((item,index)=>{const wrap=document.createElement('div');wrap.className='swipe-wrap';wrap.innerHTML=`<button class="trash" aria-label="削除">🗑</button><div class="manage-item ${item[1]?'':'off'}" data-index="${index}"><div class="drag">≡</div><div class="item-name">${esc(item[0])}</div><div class="state-dot"></div></div>`;list.appendChild(wrap);setupGestures(wrap,index);wrap.querySelector('.trash').onclick=()=>{if(confirm(`「${item[0]}」を削除しますか？`)){store[activeCat].items.splice(index,1);save();renderList();renderMenus();generatePost()}}})}
function setupGestures(wrap,index){const item=wrap.querySelector('.manage-item');let sx=0,sy=0,lastY=0,timer=null,drag=false,moved=false;item.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;lastY=e.clientY;moved=false;timer=setTimeout(()=>{drag=true;item.classList.add('dragging');item.setPointerCapture(e.pointerId)},380)});item.addEventListener('pointermove',e=>{const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>8||Math.abs(dy)>8)moved=true;if(drag){e.preventDefault();const els=[...$('menuList').querySelectorAll('.manage-item')];const target=els.find(x=>{const r=x.getBoundingClientRect();return e.clientY>r.top&&e.clientY<r.bottom});if(target&&target!==item){const from=+item.dataset.index,to=+target.dataset.index;const [x]=store[activeCat].items.splice(from,1);store[activeCat].items.splice(to,0,x);save();renderList()}lastY=e.clientY}else if(dx<-45&&Math.abs(dy)<35){wrap.classList.add('swiped')}else if(dx>25){wrap.classList.remove('swiped')}});function end(){clearTimeout(timer);if(drag){drag=false;item.classList.remove('dragging');renderMenus();generatePost();return}if(!moved){const i=+item.dataset.index;store[activeCat].items[i][1]=store[activeCat].items[i][1]?0:1;save();renderList();renderMenus();generatePost()}}item.addEventListener('pointerup',end);item.addEventListener('pointercancel',()=>{clearTimeout(timer);drag=false;item.classList.remove('dragging')})}
$('closeModal').onclick=()=>$('modal').classList.remove('open');$('modal').addEventListener('click',e=>{if(e.target===$('modal'))$('modal').classList.remove('open')});$('displayCount').addEventListener('input',()=>{store[activeCat].displayCount=Math.max(1,Math.min(30,+$('displayCount').value||1));save();renderMenus();generatePost()});$('addMenu').onclick=()=>{const name=$('newMenu').value.trim();if(!name)return;if(store[activeCat].items.some(x=>x[0]===name)){alert('同じメニューが登録されています。');return}store[activeCat].items.push([name,1]);$('newMenu').value='';save();renderList();renderMenus();generatePost()};$('newMenu').addEventListener('keydown',e=>{if(e.key==='Enter')$('addMenu').click()});
document.querySelectorAll('[data-emoji]').forEach(b=>b.onclick=()=>{emojiMode=b.dataset.emoji;document.querySelectorAll('[data-emoji]').forEach(x=>x.classList.toggle('active',x===b));generatePost()});$('generate').onclick=()=>{variant++;generatePost()};['postDate','weather','reserveType'].forEach(id=>$(id).addEventListener('change',generatePost));['customMenu','limitedInfo'].forEach(id=>$(id).addEventListener('input',realtime));$('mockFetch').onclick=()=>{$('reserveBadge').textContent='取得中…';$('reserveBadge').classList.remove('no-slots');$('reserveDetail').classList.remove('no-slots');setTimeout(()=>{$('reserveType').value='afternoon';generatePost()},650)};$('copy').onclick=async()=>{try{await navigator.clipboard.writeText($('preview').textContent);const b=$('copy'),old=b.textContent;b.textContent='コピーしました';setTimeout(()=>b.textContent=old,1300)}catch(e){alert('コピーできませんでした。Safariで開いてお試しください。')}};$('openX').onclick=()=>window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent($('preview').textContent),'_blank');
renderMenus();generatePost();
</script>
</body>
</html>
