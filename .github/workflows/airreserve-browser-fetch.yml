name: Airリザーブ ブラウザ取得
run-name: ${{ inputs.request_id || 'Airリザーブ定期取得' }}

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "確認開始日 YYYY-MM-DD"
        required: false
        type: string
      days:
        description: "確認日数 1〜4"
        required: false
        default: "4"
        type: string
      request_id:
        description: "アプリからの実行識別子"
        required: false
        type: string
  schedule:
    - cron: "0 22,0,2,4,6,8 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/airreserve-browser-fetch.mjs"
      - "scripts/airreserve-extract.mjs"
      - ".github/workflows/airreserve-browser-fetch.yml"
      - "package.json"

permissions:
  contents: write

concurrency:
  group: airreserve-browser-fetch
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v5

      - name: Node.jsを設定
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: 依存関係をインストール
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm install --no-audit --no-fund --prefer-offline

      - name: 標準搭載Chromeを確認
        run: google-chrome --version

      - name: Airリザーブ週間表を取得
        env:
          AIR_RESERVE_URL: "https://airrsv.net/lemonnoki/calendar"
          PLAYWRIGHT_CHANNEL: "chrome"
          DEBUG_SCREENSHOT: "0"
          START_DATE_INPUT: ${{ inputs.start_date }}
          DAYS_INPUT: ${{ inputs.days }}
        run: |
          if [ -n "$START_DATE_INPUT" ]; then
            export START_DATE="$START_DATE_INPUT"
          else
            export START_DATE="$(TZ=Asia/Tokyo date +%F)"
          fi

          if [ -n "$DAYS_INPUT" ]; then
            export DAYS="$DAYS_INPUT"
          else
            export DAYS="4"
          fi

          echo "START_DATE=$START_DATE"
          echo "DAYS=$DAYS"
          npm run airreserve:fetch

      - name: 診断結果を保存
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: airreserve-browser-debug
          path: data/airreserve-debug
          if-no-files-found: warn
          retention-days: 14

      - name: 取得結果をコミット
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/availability.json

          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "Update Airリザーブ availability"
            git push
          fi
